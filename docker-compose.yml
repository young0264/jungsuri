version: '3.1'

services:
  jungsuri:  # м»Ён…Ңмқҙл„Ҳ мқҙлҰ„
    build:  # Dockerfileмқҳ л№Ңл“ң м„Өм •
      context: ./  # Dockerfileмқҙ мһҲлҠ” л””л үн„°лҰ¬ кІҪлЎң
      dockerfile: dockerfile  # Dockerfileмқҳ мқҙлҰ„
    image: jungsuri-image  # мқҙлҜём§Җ мқҙлҰ„ (лӮҳмӨ‘м—җ мӮ¬мҡ©н•  мҲҳ мһҲлҸ„лЎқ мқҙлҰ„ м„Өм •)
    environment:
      SPRING_PROFILES_ACTIVE : dev
      dbLoginId : young
      dbPassword : ${DB_PASSWORD}
      jooqVersion : 3.18.0
      mailSendLoginId : euiyoung1403
      mailSendPassword : ${MAIL_PASSWORD}
      weatherAPIKey : ${WEATHER_API_KEY}
      MYSQL_ROOT_PASSWORD : ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD : ${DB_PASSWORD}
      MYSQL_USER : young
      MYSQL_PASSWORD : ${DB_PASSWORD}
      MYSQL_DATABASE : jungsuri
      MYSQL_RANDOM_ROOT_PASSWORD : ${DB_PASSWORD}
    ports:
      - "8002:8002"
    depends_on:
      - jungsuri-db
    networks:
      - jungsuri-network
    volumes:
      - ./build/libs/jungsuri-0.0.1-SNAPSHOT.jar:/app/app.jar


  jungsuri-db:
    image: mysql:8.1
    environment:
      MYSQL_ROOT_PASSWORD : ${DB_PASSWORD}
      MYSQL_DATABASE : jungsuri
      MYSQL_USER : young
      MYSQL_PASSWORD : ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD : yes
    ports:
      - "3306:3306"
    networks:
      - jungsuri-network

networks:
  jungsuri-network:
    driver: bridge

<!DOCTYPE html>
<html
        class="no-js"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        xmlns="http://www.w3.org/1999/html"
        lang="en">


<link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
<script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
<div th:fragment="main-header">
    <div class="menubar-area">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
                <a class="navbar-brand" href="#"><img src="/img/logo.png" alt="" class="logo"></a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-link">
                            <a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/member/sign-in}">로그인</a>
                        </li>

                        <li class="nav-link">
                            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/member/log-out}">로그아웃</a>
                        </li>

                        <li class="nav-link">
                            <a class="nav-link" th:href="@{/member/sign-up}">회원가입</a>
                        </li>

                        <li class="nav-link">
                            <a class="nav-link" th:href="@{/post/new}">게시물 등록 </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>
</div>

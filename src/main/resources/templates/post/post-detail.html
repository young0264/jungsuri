<!doctype html>
<html lang="en">
<head>
    <title>Contact Form 08</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,700' rel='stylesheet' type='text/css'>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link type="text/css" href="/css/font-awesome.min.css" rel="stylesheet">
    <link type="text/css" href="/css/animate.css" rel="stylesheet">
    <link type="text/css" href="/css/jquery.mCustomScrollbar.css" rel="stylesheet">
    <link type="text/css" href="/css/owl.carousel.min.css" rel="stylesheet">
    <link type="text/css" href="/css/bootstrap.min.css" rel="stylesheet">
    <link type="text/css" href="/css/normalize.css" rel="stylesheet">
    <link type="text/css" href="/style.css" rel="stylesheet">
    <link type="text/css" href="/css/responsive.css" rel="stylesheet">

    <!---->


</head>
<body>
<div th:replace="fragment/home-header::main-header"></div>

<section class="ftco-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center mb-5">
                <h2 class="heading-section">Post Detail</h2>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="wrapper img" style="background-image: url(/img/img.jpg); background-size: cover">
                    <div class="row">
                        <div class="col-md-9 col-lg-7">
                            <div class="contact-wrap w-100 p-md-5 p-4">
                                <div id="form-message-warning" class="mb-4"></div>
                                <!--                                <div id="form-message-success" class="mb-4">-->
                                <!--                                    Your message was sent, thank you!-->
                                <!--                                </div>-->

                                <form th:object="${postDto}">
                                    <div class="post-header">
                                        <div class="col-md-12">
                                            <div class="form-group">
                                                <div th:utext="${postDto.getTitle()}" class="form-control">제목</div>
                                            </div>
                                        </div>
                                        <div style="padding:10px" class="post-body">
                                            <div class="form-group">
                                                <div style="width:390px; height:300px" th:text="${postDto.getContent()}"
                                                     class="form-control">내용
                                                </div>
                                            </div>
                                        </div>
                                        <form>
<!--                                            <button th:href="@{/post/modify/{id}(id=${postDto.id})}" class="btn btn-primary">수정</button>-->
                                            <a th:href="@{/post/modify/{id}(id=${postDto.id})}" class="btn btn-primary">수정</a>
                                        </form>

                                        <form th:action="@{/post/delete/{id}(id=${postDto.id})}" th:method="delete">

                                            <button class="btn btn-warning" type="submit">삭제</button>
                                        </form>

                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
<div th:replace="fragment/home-footer::main-footer"></div>

<script src="/js/jquery.min.js"></script>
<script src="/js/popper.js"></script>
<script src="/js/bootstrap.min.js"></script>
<script src="/js/jquery.validate.min.js"></script>
<script src="/js/main.js"></script>

</body>
</html>

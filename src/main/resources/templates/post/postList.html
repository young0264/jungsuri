<!DOCTYPE html>
<html
        class="no-js"
        xmlns:th="http://www.thymeleaf.org"
        lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Focal - Resume</title>
    <link type="text/css" href="/css/font-awesome.min.css" rel="stylesheet">
    <link type="text/css" href="/css/animate.css" rel="stylesheet">
    <link type="text/css" href="/css/jquery.mCustomScrollbar.css" rel="stylesheet">
    <link type="text/css" href="/css/owl.carousel.min.css" rel="stylesheet">
    <link type="text/css" href="/css/bootstrap.min.css" rel="stylesheet">
    <link type="text/css" href="/css/normalize.css" rel="stylesheet">
    <link type="text/css" href="/style.css" rel="stylesheet">
    <link type="text/css" href="/css/responsive.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/icofont.min.css">

    <!--	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">-->

    <script src="/js/jquery-1.12.4.min.js"></script>
</head>

<link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
<script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
<!------ Include the above in your HEAD tag ---------->
<body>
<!--Start Main Menu Logo-->
<div th:replace="fragment/home-header::main-header"></div>
<!--End Main Menu Logo-->


<!--Start Post Content-->
<div class="container">

    <div class="row gutters-20">
        <th:block th:each="post : ${postList}" class="col mb-4">

            <!--col-lg-4 로하면3개 5,6하면 두개리팩토링-->
            <div class="col-lg-5 col-md-6 col-6">
                <div class="card mb-2">
                    <!--post image 붙이기 -->
                    <div class="card-body">
                        <h5 class="card-title">
                            <a th:text="${post.title}"></a>
                        </h5>
                        <hr class="my-1">
                        <div>
                            <i class="icofont-clock-time"></i>
                            <span th:text="${#temporals.format(post.createDate, 'yyyy-MM-dd:mm')}"></span>
                            <span th:text="${post.modifyDate}"></span>
                        </div>
                        <div>
                            <i class="icofont-ui-user"></i><!-232322--->
                            <span th:text="${member}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <!--리팩토링 전-->
        <!--            <div class="card-body">-->
        <!--                <h1 class="card-title d-flex justify-content-between">-->
        <!--                    <h2 class="card-title d-flex justify-content-between" th:text="${post.title}"></h2>-->
        <!--                    <h3 th:text="${post.content}"></h3>-->
        <!--                </h1>-->
        <!--            </div>-->

    </div>
    <!--End of row-->
</div>
<!--End of container-->
<!--End of Post Content -->


<!--Start Testimonial footer-->
<div id="testimonial" class="testimonial-area">
    <div th:replace="fragment/home-footer::main-footer"></div>
</div>

<!--End of testimonial-->
</body>
